stages:
  - lint
  - unit

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"

cache:
  paths:
    - .pip-cache/

lint:
  stage: lint
  image: python:3.11
  script:
    - python -m pip install --upgrade pip
    - pip install -e ".[dev]"
    - ruff check .

unit:
  stage: unit
  image: python:3.11
  script:
    - python -m pip install --upgrade pip
    - pip install -e ".[dev]"
    - pytest -q tests
