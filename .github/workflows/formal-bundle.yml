name: formal-bundle

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  formal-smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      ML_ARCHER_HOME: ~/.codex
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - uses: actions/cache@v4
        with:
          path: |
            ~/.codex/cache/ml-archer/toolchains
            ~/.codex/cache/ml-archer/shared_workspace
          key: formal-${{ runner.os }}-${{ hashFiles('scripts/formal/templates/lean-toolchain', 'scripts/formal/templates/lakefile.toml') }}
          restore-keys: |
            formal-${{ runner.os }}-
      - run: python scripts/formal/setup.py --target verify --allow-network --yes
      - run: python scripts/formal/lean_check.py --json
      - run: python scripts/formal/build_bundle.py --output dist/
      - uses: actions/upload-artifact@v4
        with:
          name: ml-archer-formal-bundle-${{ runner.os }}
          path: dist/*
          retention-days: 7
